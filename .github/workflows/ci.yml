name: Service Catalog CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 🔐 Required for GHCR push
permissions:
  contents: read
  packages: write

jobs:
  build-and-security:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Run lint
      - name: Run Lint
        run: npm run lint

      # 5️⃣ Run tests
      - name: Run Tests
        run: npm test

      # 6️⃣ Snyk Security Scan (DevSecOps)
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # 7️⃣ Convert repo owner to lowercase (FIX for Docker)
      - name: Set lowercase repo owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      # 8️⃣ Login to GitHub Container Registry
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 9️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile \
          -t ghcr.io/${{ env.OWNER_LC }}/service-catalog:latest .

      # 🔟 Push Docker Image to GHCR
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/service-catalog:latest
