name: Service Catalog CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Docker Image
        run: docker build -f docker/Dockerfile -t service-catalog-service .
